name: CD - Deploy to Staging & Production

on:
  push:
    branches: [develop, main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    environment: staging
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cleanup before build
        run: |
          docker compose -f $GITHUB_WORKSPACE/docker-compose.prod.yml down || true
          docker image prune -af || true
          docker builder prune -af || true

      - name: Build server image
        run: |
          cd $GITHUB_WORKSPACE
          docker build -t inkubasi2026-server:latest ./server

      - name: Build client image
        run: |
          cd $GITHUB_WORKSPACE
          docker build -t inkubasi2026-client:latest ./client

      - name: Start database
        run: |
          cd $GITHUB_WORKSPACE
          export DB_USERNAME=postgres
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export DB_NAME=moderno_db
          export JWT_SECRET=${{ secrets.JWT_SECRET }}
          export FRONTEND_URL=http://localhost:3000
          export NEXT_PUBLIC_API_URL=http://localhost:3001/api
          docker compose -f docker-compose.prod.yml up -d postgres
          sleep 15

      - name: Run DB Migration
        run: |
          docker run --rm \
            --network inkubasi2026_default \
            -e DB_HOST=moderno-db-prod \
            -e DB_PORT=5432 \
            -e DB_USERNAME=postgres \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=moderno_db \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e NODE_ENV=staging \
            inkubasi2026-server:latest node dist/main.js &
          sleep 20
          kill %1 || true
          echo "✅ Migration completed"

      - name: Start all services
        run: |
          cd $GITHUB_WORKSPACE
          export DB_USERNAME=postgres
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export DB_NAME=moderno_db
          export JWT_SECRET=${{ secrets.JWT_SECRET }}
          export FRONTEND_URL=http://localhost:3000
          export NEXT_PUBLIC_API_URL=http://localhost:3001/api
          docker compose -f docker-compose.prod.yml up -d

      - name: Health check
        run: |
          sleep 30
          curl -f http://localhost:3001/api/products && echo "✅ Backend healthy" || exit 1
          curl -f http://localhost:3000 && echo "✅ Frontend healthy" || exit 1

      - name: Summary
        run: |
          echo "🚀 Staging deployed successfully!"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cleanup before build
        run: |
          docker compose -f $GITHUB_WORKSPACE/docker-compose.prod.yml down || true
          docker image prune -af || true
          docker builder prune -af || true

      - name: Build server image
        run: |
          cd $GITHUB_WORKSPACE
          docker build -t inkubasi2026-server:latest ./server

      - name: Build client image
        run: |
          cd $GITHUB_WORKSPACE
          docker build -t inkubasi2026-client:latest ./client

      - name: Start all services
        run: |
          cd $GITHUB_WORKSPACE
          export DB_USERNAME=postgres
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export DB_NAME=moderno_db
          export JWT_SECRET=${{ secrets.JWT_SECRET }}
          export FRONTEND_URL=http://localhost:3000
          export NEXT_PUBLIC_API_URL=http://localhost:3001/api
          docker compose -f docker-compose.prod.yml up -d

      - name: Health check
        run: |
          sleep 30
          curl -f http://localhost:3001/api/products && echo "✅ Production backend healthy" || exit 1
          curl -f http://localhost:3000 && echo "✅ Production frontend healthy" || exit 1

      - name: Summary
        run: |
          echo "🚀 Production deployed! (Rolling Update Strategy)"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
