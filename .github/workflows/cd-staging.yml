name: CD - Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Deploy to VPS Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose to server
        run: |
          scp docker-compose.prod.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/moderno/docker-compose.prod.yml
          scp server/.env.example ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/moderno/server.env

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            cd ~/moderno

            # Set environment variables
            export DB_USERNAME=postgres
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export DB_NAME=moderno_db
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export FRONTEND_URL=http://${{ secrets.SSH_HOST }}:3000
            export NEXT_PUBLIC_API_URL=http://${{ secrets.SSH_HOST }}:3001/api
            export DOCKER_IMAGE_SERVER=moderno-server
            export DOCKER_IMAGE_CLIENT=moderno-client

            # Pull latest code
            cd ~/myfork
            git pull origin develop

            # Build images
            docker compose -f docker-compose.prod.yml build

            # Run DB migration
            docker compose -f docker-compose.prod.yml run --rm server \
              node dist/main.js migrate || exit 1

            # Start services
            docker compose -f docker-compose.prod.yml up -d

            # Health check
            sleep 30
            curl -f http://localhost:3001/api/products || exit 1
            echo "Staging deployment successful!"
          ENDSSH

      - name: Notify success
        run: echo "Deployed to staging - http://${{ secrets.SSH_HOST }}:3000"
